<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週間作業スケジュールボード - Production Management</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/schedule-board.css">
</head>
<body>
  <div class="app-container">
    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-content">
        <h1 class="app-title">🗓️ 週間作業スケジュールボード</h1>
        <p class="app-subtitle">Weekly Work Schedule Board</p>
      </div>
      <div class="header-buttons">
        <a class="btn-staff-manage" href="/">📋 案件管理に戻る</a>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- スマホ幅では「スケジュール」「提案確認」を1画面ずつタブ切り替えで表示する -->
      <div class="sb-mobile-tabs">
        <button type="button" class="sb-mobile-tab-btn active" id="sb-mobile-tab-schedule"
                onclick="scheduleBoard.switchMobileTab('schedule')">📅 スケジュール</button>
        <button type="button" class="sb-mobile-tab-btn" id="sb-mobile-tab-proposals"
                onclick="scheduleBoard.switchMobileTab('proposals')">📝 提案確認<span class="sb-proposals-badge" id="sb-mobile-proposals-badge"></span></button>
      </div>

      <div class="sb-layout">
        <div class="sb-main-column">
          <section class="sb-week-nav">
            <button class="btn btn-secondary" onclick="scheduleBoard.prevWeek()">◀ 前週</button>
            <h2 id="sb-week-label"></h2>
            <div class="sb-week-nav-right">
              <button type="button" class="btn btn-primary" id="sb-auto-propose-week-btn"
                      onclick="scheduleBoard.autoProposeWeek()">🤖 今週を自動割り当て</button>
              <button class="btn btn-secondary" onclick="scheduleBoard.nextWeek()">次週 ▶</button>
            </div>
          </section>

          <div class="sb-legend" id="sb-legend"></div>

          <!-- デスクトップ: 従業員×日付の表 -->
          <div class="table-container sb-desktop-board">
            <table class="projects-table sb-board-table" id="sb-board-table">
              <thead>
                <tr id="sb-board-head"></tr>
              </thead>
              <tbody id="sb-board-body"></tbody>
            </table>
          </div>

          <!-- スマホ: 従業員を1人選び、その週を日ごとに縦積み表示 -->
          <div class="sb-mobile-board">
            <div class="sb-mobile-employee-select">
              <label>
                従業員
                <select id="sb-mobile-employee-select" onchange="scheduleBoard.onMobileEmployeeChange()"></select>
              </label>
            </div>
            <div id="sb-mobile-days"></div>
          </div>

          <section class="sb-prep-list-section">
            <h2 class="sb-section-title">🗂️ 準備項目リスト</h2>
            <div id="sb-prep-list"></div>
          </section>

          <section class="sb-progress-section">
            <h2 class="sb-section-title">📈 案件別 消化率（実績時間 ÷ 作業予定時間）</h2>
            <div id="sb-progress-list"></div>
          </section>
        </div>

        <aside class="sb-proposals-sidebar is-mobile-hidden">
          <div class="sb-proposals-header">
            <h2 class="sb-section-title">📝 提案確認<span class="sb-proposals-badge" id="sb-proposals-badge"></span></h2>
            <!-- タブレット幅(769〜1024px)でのみ表示される開閉ボタン -->
            <button type="button" class="sb-tablet-collapse-btn" id="sb-tablet-collapse-btn"
                    onclick="scheduleBoard.toggleTabletProposals()" title="提案確認パネルの開閉">◀</button>
          </div>

          <div class="sb-proposals-filters">
            <label>
              担当者
              <select id="sb-proposals-filter-employee" onchange="scheduleBoard.onProposalsFilterChange()">
                <option value="">すべて</option>
              </select>
            </label>
            <label>
              スコア
              <select id="sb-proposals-filter-score" onchange="scheduleBoard.onProposalsFilterChange()">
                <option value="">すべて</option>
                <option value="100">100%のみ</option>
                <option value="80">80%以上</option>
                <option value="50">50%以上</option>
              </select>
            </label>
          </div>

          <div class="sb-proposals-cards" id="sb-proposals-cards"></div>
        </aside>
      </div>
    </main>
  </div>

  <!-- ===== モーダル: セル詳細 ===== -->
  <div id="sb-detail-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="sb-detail-title">詳細</h2>
        <button class="btn-close" onclick="scheduleBoard.closeDetailModal()">✕</button>
      </div>
      <div class="sb-detail-body" id="sb-detail-body"></div>
    </div>
  </div>

  <!-- ===== モーダル: 勤務時間編集（その日だけの勤務時間 + 案件の割り当て） ===== -->
  <div id="sb-override-modal" class="modal">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2 id="sb-override-title">勤務時間編集</h2>
        <button class="btn-close" onclick="scheduleBoard.closeOverrideModal()">✕</button>
      </div>
      <form id="sb-override-form" class="project-form">
        <div class="form-group">
          <label class="sb-override-daycheck">
            <input type="checkbox" id="ov-is-day-off"> この日は休み
          </label>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>出勤時刻</label>
            <input type="time" id="ov-start-time">
          </div>
          <div class="form-group">
            <label>退勤時刻</label>
            <input type="time" id="ov-end-time">
          </div>
        </div>

        <div class="form-group">
          <label>休憩時間（分）</label>
          <input type="number" id="ov-break-minutes" min="0" step="5" value="0">
        </div>

        <div class="form-group">
          <label>準備・フォロー予約時間(時間)</label>
          <input type="number" id="ov-reserved-hours" min="0" step="0.5" value="0">
        </div>

        <div class="form-group sb-allocation-section">
          <label>案件の割り当て</label>
          <div class="sb-override-summary" id="sb-override-summary"></div>
          <div id="sb-allocation-rows"></div>
          <button type="button" class="btn btn-small btn-secondary sb-add-allocation-btn" onclick="scheduleBoard.addAllocationRow()">
            ➕ 案件を追加
          </button>
        </div>

        <div class="form-group sb-allocation-section">
          <label>準備項目タスクの割り当て <span class="field-hint">(【準備】で表示区別)</span></label>
          <div id="sb-prep-item-rows"></div>
          <div class="sb-add-prep-item-row">
            <select id="sb-add-prep-item-select"></select>
            <input type="number" id="sb-add-prep-item-hours" step="0.25" min="0" placeholder="工数(h)">
            <button type="button" class="btn btn-small btn-secondary" onclick="scheduleBoard.addPrepItemRow()">➕ 追加</button>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="ov-delete-btn" style="display: none;" onclick="scheduleBoard.deleteOverride()">
            🗑️ 削除
          </button>
          <button type="button" class="btn btn-secondary" onclick="scheduleBoard.closeOverrideModal()">
            キャンセル
          </button>
          <button type="submit" class="btn btn-primary">
            保存
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- スクリプト -->
  <script src="js/utils.js"></script>
  <script src="js/schedule-board.js"></script>
</body>
</html>
